<meta charset="UTF-8">

<title>Renewal Trek Dashboard</title>
<style>
:root {
  color-scheme: light;
  --orange: #FC6A21;
  --dark: #1B1C1E;
  --green: #22C55E;
  --yellow: #F59E0B;
  --red: #EF4444;
  --bg: #F4F5F7;
  --border: #E5E7EB;
  --text: #111827;
  --muted: #6B7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

header {
  background: var(--dark); color: white; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-dot { width: 32px; height: 32px; background: var(--orange); border-radius: 8px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:white; flex-shrink:0; }
.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 11px; color: #9CA3AF; margin-top: 1px; }
.header-right { text-align: right; font-size: 11px; color: #9CA3AF; line-height: 1.6; }

.data-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
  margin-top: 4px;
}
.badge-live { background: #DCFCE7; color: #15803D; }
.badge-cached { background: #FEF3C7; color: #92400E; }

.filters {
  background: white; border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 11px; font-weight: 600; color: var(--muted); white-space: nowrap; }
.filter-group select { font-size: 12px; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; background: white; cursor: pointer; color: var(--text); }
.filter-group select:focus { outline: none; border-color: var(--orange); }

.main { padding: 18px 24px; }

.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi { background: white; border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--accent, var(--orange)); }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.kpi-value { font-size: 26px; font-weight: 800; margin-top: 4px; color: var(--text); line-height: 1; }
.kpi-denom { font-size: 14px; font-weight: 500; color: var(--muted); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-card { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 16px; }
.card-title { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.chart-wrap { position: relative; height: 185px; }

/* Trek Status */
.trek-card { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
.trek-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.trek-col { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
.trek-col-header { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
.trek-col-label { font-size: 13px; font-weight: 800; }
.trek-status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; width: fit-content; }
.trek-stats { display: flex; gap: 10px; padding: 6px 12px 8px; border-bottom: 1px solid var(--border); }
.trek-stat { font-size: 11px; }
.trek-stat-val { font-weight: 700; }
.trek-stat-lbl { color: var(--muted); }
.trek-col-body { padding: 8px; flex: 1; overflow-y: auto; max-height: 280px; display: flex; flex-direction: column; gap: 4px; }
.trek-account-row { padding: 6px 8px; border-radius: 6px; background: var(--bg); border: 1px solid transparent; display: flex; align-items: center; gap: 6px; font-size: 11px; }
.trek-account-row:hover { border-color: var(--border); background: white; }
.trek-acct-name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.trek-acct-acv { font-size: 10px; color: var(--muted); white-space: nowrap; }
.trek-col.in-progress .trek-col-header { background: #FFF7ED; }
.trek-col.not-started .trek-col-header { background: #F9FAFB; }
.badge-in-progress { background: #FEF3C7; color: #92400E; }
.badge-not-started { background: #F3F4F6; color: #6B7280; }
.dot-in-progress { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); display: inline-block; }
.dot-not-started { width: 6px; height: 6px; border-radius: 50%; background: #D1D5DB; display: inline-block; }
.sent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sent-dot.Green { background: #22C55E; }
.sent-dot.Yellow { background: #F59E0B; }
.sent-dot.Red { background: #EF4444; }
.sent-dot.NA { background: #D1D5DB; }

/* Exec */
.exec-card { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
.exec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 220px; overflow-y: auto; }
.exec-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; background: #FAFAFA; border: 1px solid #F3F4F6; }
.exec-avatar { width: 28px; height: 28px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.exec-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.exec-role { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.exec-count { margin-left: auto; background: #EEF2FF; color: #4338CA; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

/* Table */
.table-card { background: white; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
.table-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); background: #FAFAFA; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; white-space: nowrap; }
td { padding: 8px 12px; border-bottom: 1px solid #F3F4F6; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFBFF; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.badge-green { background: #DCFCE7; color: #15803D; }
.badge-yellow { background: #FEF3C7; color: #92400E; }
.badge-red { background: #FEE2E2; color: #991B1B; }
.badge-na { background: #F3F4F6; color: #6B7280; }
.score-chip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.s0,.s1 { background:#FEE2E2; color:#991B1B; }
.s2,.s3 { background:#FEF3C7; color:#92400E; }
.s4,.s5 { background:#DCFCE7; color:#15803D; }
.tick { color: #22C55E; font-weight: 700; font-size: 13px; }
.dash { color: #D1D5DB; font-size: 13px; }
.company-name { font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
.exec-pills { display: flex; flex-wrap: wrap; gap: 3px; }
.exec-pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #F3F4F6; color: #374151; white-space: nowrap; }
.exec-pill.sponsor { background: #EEF2FF; color: #4338CA; }
.exec-pill.cs { background: #F0FDF4; color: #15803D; }
.exec-pill.ridealong { background: #FFF7ED; color: #C2410C; }
</style>
</head>

function fmt(n) {
  if (n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if (n>=1e3) return '$'+Math.round(n/1e3)+'K';
  return '$'+n;
}
function shortName(s) { return s.replace(/\s*\(.*?\)\s*/g,'').trim(); }
function roleOf(s)     { const m=s.match(/\(([^)]+)\)/); return m?m[1]:''; }
function initials(s)   { return shortName(s).split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
function isBool(v)     { return v===true||v==='True'||v==='1'; }

function parseMulti(v) {
  if (!v) return [];
  const result=[]; let depth=0,cur='';
  for (const ch of v) {
    if (ch==='(') depth++;
    else if (ch===')') depth--;
    else if (ch===','&&depth===0) { if(cur.trim()) result.push(cur.trim()); cur=''; continue; }
    cur+=ch;
  }
  if (cur.trim()) result.push(cur.trim());
  return result;
}

function rowFromSheet(cells, colMap) {
  const cell = t => { const i=colMap[t]; if(i===undefined) return null; const c=cells.find(x=>x.column_index===i); return c?c.value:null; };
  return {
    company:      cell('Company Name'),
    sentiment:    cell('Sentiment')||'N/A',
    score:        cell('Propensity to Renew Score')||'',
    renewalQ:     cell('Renewal Quarter')||'',
    trekQ:        cell('Trek Quarter')||'',
    segment:      cell('Company Segment')||'',
    tier:         cell('Company CS Tier')||'',
    csm:          cell('CSM Name')||'',
    acv:          parseFloat(cell('SUM of ACV Bookings ($)')||0),
    prioritized:  (cell('Prioritized Account?')||'').toLowerCase(),
    meetingDone:  isBool(cell('Meeting Completed?')),
    execSponsors: parseMulti(cell('[Confirmed] Exec Sponsor')),
    csSponsors:   parseMulti(cell('[Confirmed] CS Sponsor')),
    r1: cell('Ridealong Seat 1')||'',
    r2: cell('Ridealong Seat 2')||'',
    r3: cell('Ridealong Seat 3')||'',
  };
}

async function tryLiveRefresh() {
  try {
    const result = await window.cowork.callMcpTool(
      'mcp__9c318d2c-5df3-46cb-81bb-d5a6624dddad__get_sheet_summary',
      { sheet_id: 3787138412793732, columns: [
          'Company Name','Sentiment','Propensity to Renew Score','Renewal Quarter',
          'Trek Quarter','Company Segment','Company CS Tier','CSM Name',
          'SUM of ACV Bookings ($)','Prioritized Account?','Meeting Completed?',
          '[Confirmed] Exec Sponsor','[Confirmed] CS Sponsor',
          'Ridealong Seat 1','Ridealong Seat 2','Ridealong Seat 3'
        ]
      }
    );
    const colMap={};
    (result.available_columns||[]).forEach(c=>{ colMap[c.title]=c.index; });
    const fresh = (result.rows||[])
      .filter(r=>r.cells&&r.cells.length)
      .map(r=>rowFromSheet(r.cells,colMap))
      .filter(r=>r.company);
    if (fresh.length > 0) {
      allRows = fresh;
      isLive = true;
      document.getElementById('dataBadge').className='data-badge badge-live';
      document.getElementById('dataBadge').textContent='â Live';
      document.getElementById('lastUpdated').textContent=
        'Refreshed '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      applyFilters();
    }
  } catch(e) {
    // Silent â seed data already showing
  }
}

function populate(id, values) {
  const sel=document.getElementById(id);
  const first=sel.options[0].cloneNode(true);
  sel.innerHTML=''; sel.appendChild(first);
  values.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}

function applyFilters() {
  const trekF=document.getElementById('fTrek').value;
  const segF =document.getElementById('fSegment').value;
  const priF =document.getElementById('fPriority').value;
  const sentF=document.getElementById('fSentiment').value;
  const rows=allRows.filter(r=>
    (!trekF||r.trekQ===trekF)&&
    (!segF||r.segment===segF)&&
    (!priF||r.prioritized.startsWith(priF))&&
    (!sentF||r.sentiment===sentF)
  );
  render(rows);
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c=>{ try{c.destroy();}catch(e){} });
  chartInstances={};
}

            <div class="trek-stats">
              <div class="trek-stat"><span class="trek-stat-val">${accts.length}</span> <span class="trek-stat-lbl">accounts</span></div>
              <div class="trek-stat"><span class="trek-stat-val">${fmt(qACV)}</span> <span class="trek-stat-lbl">ACV</span></div>
            </div>
            <div class="trek-col-body">
              ${accts.length===0
                ? '<div style="font-size:11px;color:var(--muted);text-align:center;padding:20px 0">No accounts</div>'
                : accts.map(r=>`<div class="trek-account-row"><span class="sent-dot ${r.sentiment==='N/A'?'NA':r.sentiment}"></span><span class="trek-acct-name" title="${r.company}">${r.company}</span><span class="trek-acct-acv">${fmt(r.acv)}</span></div>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${execList.length>0?`
    <div class="exec-card">
      <div class="card-title" style="margin-bottom:10px">Exec Participants Across Trek</div>
      <div class="exec-grid">
        ${execList.map(([name,info])=>`
          <div class="exec-item">
            <div class="exec-avatar" style="background:${typeDotColor[info.type]||'#999'}">${initials(name)}</div>
            <div style="min-width:0;flex:1">
              <div class="exec-name">${shortName(name)}</div>
              ${roleOf(name)?`<div class="exec-role">${roleOf(name)}</div>`:''}
            </div>
            <div class="exec-count">${info.count} acct${info.count>1?'s':''}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:14px;margin-top:10px">
        <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><span style="width:8px;height:8px;border-radius:50%;background:#4338CA;display:inline-block"></span>Exec Sponsor</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><span style="width:8px;height:8px;border-radius:50%;background:#15803D;display:inline-block"></span>CS Sponsor</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><span style="width:8px;height:8px;border-radius:50%;background:#C2410C;display:inline-block"></span>Ridealong</span>
      </div>
    </div>`:''}

    <div class="table-card">
      <div class="table-header">
        <div class="card-title" style="margin:0">All Accounts (${n})</div>
        <div style="font-size:11px;color:var(--muted)">Sorted by ACV</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Company</th><th>Segment</th><th>Trek Q</th><th>Renewal Q</th>
            <th>ACV</th><th>Sentiment</th><th>Score</th><th>â</th>
            <th>CSM</th><th>Mtg Done</th><th>Exec Sponsor</th><th>CS Sponsor</th><th>Ridealongs</th>
          </tr></thead>
          <tbody>
            ${rows.slice().sort((a,b)=>b.acv-a.acv).map(r=>{
              const snum=scoreNum(r.score);
              const sc=snum>=0?`s${snum}`:'s3';
              const pri=r.prioritized.startsWith('yes');
              const rides=[r.r1,r.r2,r.r3].filter(Boolean);
              return `<tr>
                <td><span class="company-name" title="${r.company}">${r.company}</span></td>
                <td>${r.segment}</td>
                <td style="white-space:nowrap">${r.trekQ}</td>
                <td style="white-space:nowrap">${r.renewalQ}</td>
                <td style="font-weight:700">${fmt(r.acv)}</td>
                <td><span class="badge ${sentClass(r.sentiment)}">${r.sentiment}</span></td>
                <td style="text-align:center"><span class="score-chip ${sc}">${snum>=0?snum:'?'}</span></td>
                <td style="text-align:center">${pri?'<span class="tick">â</span>':'<span class="dash">â</span>'}</td>
                <td style="color:var(--muted);font-size:11px;white-space:nowrap">${r.csm}</td>
                <td style="text-align:center">${r.meetingDone?'<span class="tick">â</span>':'<span class="dash">â</span>'}</td>
                <td><div class="exec-pills">${r.execSponsors.map(e=>`<span class="exec-pill sponsor">${shortName(e)}</span>`).join('')}</div></td>
                <td><div class="exec-pills">${r.csSponsors.map(e=>`<span class="exec-pill cs">${shortName(e)}</span>`).join('')}</div></td>
                <td><div class="exec-pills">${rides.map(e=>`<span class="exec-pill ridealong">${e}</span>`).join('')}</div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  chartInstances.sentiment=new Chart(document.getElementById('cSentiment'),{
    type:'doughnut',
    data:{labels:['Green','Yellow','Red'],datasets:[{data:[sentCount.Green,sentCount.Yellow,sentCount.Red],backgroundColor:['#22C55E','#F59E0B','#EF4444'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{font:{size:11},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw} (${fmt(sentACV[ctx.label])})`}}}}
  });
  chartInstances.segment=new Chart(document.getElementById('cSegment'),{
    type:'bar',
    data:{labels:segKeys,datasets:[{data:segKeys.map(k=>segMap[k]),backgroundColor:'#FC6A21',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'#F3F4F6'},ticks:{font:{size:10},callback:v=>fmt(v)}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
  chartInstances.trek=new Chart(document.getElementById('cTrek'),{
    type:'bar',
    data:{labels:trekChartKeys,datasets:[{data:trekChartKeys.map(k=>trekChartMap[k]),backgroundColor:'#1B1C1E',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'#F3F4F6'},ticks:{font:{size:10},callback:v=>fmt(v)}}}}
  });
}

init();
</script>
</body>
</html>
